<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trang bán đồ ăn</title>
  <style>
    /* ------------------ THANH ĐIỀU HƯỚNG ------------------ */
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #fffbea;
    }
.navbar {
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #ff9800;
        padding: 12px 30px;
        color: white;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
    }

    .navbar .logo {
        font-size: 22px;
        font-weight: bold;
    }

    .navbar ul {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
        align-items: center;
    }

    .navbar ul li {
        margin: 0 15px;
    }

 .navbar ul li a {
      color: black;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
      padding: 10px 18px;
      border-radius: 8px;
    }

    .navbar ul li a:hover {
      background-color: white;
      color: black;
    }

    .navbar.buttons {
        display: flex;
        gap: 10px;
    }
    .search-box input {
      padding: 8px 14px;
      border-radius: 8px;
      border: none;
      outline: none;
      font-size: 14px;
      width: 220px;
    }
    /* ===== DROPDOWN MENU ===== */
.dropdown {
  position: relative;
  border: none;
}

.dropdown-menu {
  display: none;
  position: absolute;
  top: 45px;
  left: 0;
  background-color: #fff;
  border: 1.5px solid #000;
  border-radius: 6px;
  min-width: 160px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.15);
  z-index: 999;
}

.dropdown-menu a {
  display: block;
  padding: 10px 12px;
  text-decoration: none;
  color: #000;
  font-weight: 500;
}

.dropdown-menu a:hover {
  background-color: #ff9800;
  color: #fff;
}
    /* ------------------ TRANG CHỦ ------------------ */
    .home {
      text-align: center;
      padding-top: 70px;
      background-color: #fffbea;
    }


    .food-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      max-width: 1000px;
      margin: 0 auto;
    }

    .food-item {
      background-color: white;
      border-radius: 15px;
      box-shadow: 0 4px 12px rgba(255, 204, 0, 0.3);
      border: 2px solid #ffcc00;
      overflow: hidden;
      transition: 0.3s ease;
    }

    .food-item:hover {
      transform: translateY(-8px) scale(1.03);
    }

    .food-item img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      border-bottom: 2px solid #ffcc00;
    }

    .food-item h3 {
      margin: 15px 0 8px;
      color: #e6a400;
      font-size: 20px;
      font-weight: 600;
    }

    .food-item p {
      font-size: 14px;
      color: #555;
      margin-bottom: 15px;
    }
    .popular-title {
  font-size: 16px;
  font-weight: 600;
  color: #000;
  background-color: #fff;
  border: 1.5px solid #000;
  padding: 6px 12px;
  border-radius: 6px;

  width: fit-content;
  margin: 20px ;   /*đẩy xuống */
}
    /* ===== BUTTON ===== */
    button.submit {
      width: 40%;
      background-color: #ff9900;
      color: white;
      padding: 6px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 15px;
    }

    button.submit a {
      text-decoration: none;
      color: white;
    }

    button.submit:hover {
      background-color: #ca7f0e;
    }
    button.cart {
      width: 50%;
      background-color: #ff9900;
      color: white;
      padding: 6px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.3s;
      margin-bottom: 15px;
    }
    button.cart:hover {
      background-color: #ca7f0e;
    }
    .footer {
  background-color: #000;
  color: rgb(255, 255, 255);
  text-align: center;
  padding: 20px 0;
  margin-top: 50px;
  font-size: 14px;
  width: 100%;
  display: flex;
  flex-direction: column;
}
.chatbot {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 360px;
  height: 520px;
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
  z-index: 9999;
  display: none;
        }

        .chat-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: #ffee03;
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            z-index: 10000;
        }

        .chat-toggle:hover {
            background: #e2dc1c;
        }
  </style>
</head>
<body>

  <!-- THANH ĐIỀU HƯỚNG -->
  <nav class="navbar">
    <div class="logo">🍔  FoodApp</div>
    <ul> 
      <li class="dropdown">
        <a href="javascript:void(0)" onclick="toggleMenu()">Các đồ uống ▾</a>
        <div class="dropdown-menu" id="popularMenu">
          <a href="trang-chu.html">Trang chính</a>
          <a href="trang-do-an.html">Đồ ăn</a>
        </div>
      </li>
      <li><a href="giohang.html">Giỏ hàng</a></li>
      <li><a href="lienhe.html">Liên hệ</a></li>
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tìm món ăn...">
      </div>
      <li><a href="auth.html">Đăng xuất</a></li>
    </ul>
  </nav>
  <div class="popular-title">🔥 Menu đồ uống</div>
  <!-- TRANG CHỦ -->
  <section class="home">
    <div class="food-container" id="drinkContainer"></div>
      <footer class="footer">
        <p>📍 Địa chỉ: Hà Nội, Việt Nam</p>
        <p> Zalo: 0941155554</p>
        <p>© 2025 FoodApp - All rights reserved</p>
      </footer>
    </div>
  </section>
  <script type="module" src="./js/do-uong.js"></script>
</body>
</html>
