<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Quản lý sản phẩm</title>

<style>
body{
    font-family: Arial;
    padding:40px;
    background:#fffbea;
}
.navbar {
        position: sticky;
        top: 0;
        z-index: 1000;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background-color: #ff9800;
        padding: 12px 30px;
        color: white;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
    }

    .navbar .logo {
        font-size: 22px;
        font-weight: bold;
    }

    .navbar ul {
        list-style: none;
        display: flex;
        margin: 0;
        padding: 0;
    }

    .navbar ul li {
        margin: 0 15px;
    }

 .navbar ul li a {
      color: black;
      text-decoration: none;
      font-size: 16px;
      font-weight: bold;
      transition: 0.3s;
      padding: 10px 18px;
      border-radius: 8px;
    }

    .navbar ul li a:hover {
      background-color: white;
      color: black;
    }

    .navbar.buttons {
        display: flex;
        gap: 10px;
    }
input{
    padding:8px;
    margin:5px;
}

button{
    padding:8px 12px;
    cursor:pointer;
    border:none;
    background:#ff9800;
    color:white;
    font-weight:bold;
}

table{
    width:100%;
    margin-top:20px;
    border-collapse: collapse;
    background:white;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
    text-align:center;
}

img{
    width:70px;
}
</style>
</head>
<body>
    <div class="navbar">
        <div class="logo">🍔  FoodApp</div>
        <ul>
            <li><a href="trang-chu.html">Quay lại</a></li>
        </ul>
    </div>
<h2>Thêm / Sửa / Xóa sản phẩm</h2>

<input type="text" id="name" placeholder="Tên sản phẩm">
<input type="number" id="price" placeholder="Giá">
<input type="link" id="image" placeholder="Link ảnh">
<button onclick="saveProduct()">Lưu</button>

<table>
<thead>
<tr>
<th>Tên</th>
<th>Giá</th>
<th>Ảnh</th>
<th>Hành động</th>
</tr>
</thead>
<tbody id="list"></tbody>
<script src="./js/admin.js"></script>

</table>
