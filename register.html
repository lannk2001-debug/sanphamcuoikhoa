<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - FoodApp</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffb347, #ffcc33);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ff9900;
        }

        .container {
            width: 380px;
            margin-top: 80px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #ff9900;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ca7f0e;
        }

        .switch {
            text-align: center;
            margin-top: 15px;
        }

        .switch a {
            color: #ff9900;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="logo">🍔 FoodApp</div>
    </div>

    <!-- REGISTER -->
    <div class="container">

        <div class="card">

            <h2>Đăng ký</h2>

            <input type="email"
                   id="email"
                   placeholder="Email">

            <input type="password"
                   id="password"
                   placeholder="Mật khẩu">

            <input type="password"
                   id="confirmPassword"
                   placeholder="Nhập lại mật khẩu">

            <button onclick="register()">
                Tạo tài khoản
            </button>

            <div class="switch">
                Đã có tài khoản?
                <a href="login.html">Đăng nhập</a>
            </div>

        </div>

    </div>


    <!-- FIREBASE -->
    <script type="module">

        // IMPORT FIREBASE
        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import { getAnalytics }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        import {
            getAuth,
            createUserWithEmailAndPassword
        }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


        // FIREBASE CONFIG
        const firebaseConfig = {

            apiKey: "AIzaSyDPZxEPNRzxwDdRZ3L2OcBAaFr7rSBgTgs",

            authDomain: "jsi33-d73a1.firebaseapp.com",

            projectId: "jsi33-d73a1",

            storageBucket: "jsi33-d73a1.firebasestorage.app",

            messagingSenderId: "835817964702",

            appId: "1:835817964702:web:b8852dd46033ea0e04e78f",

            measurementId: "G-FGW0S0XV2V"

        };


        // INIT FIREBASE
        const app = initializeApp(firebaseConfig);

        const analytics = getAnalytics(app);

        const auth = getAuth(app);


        // REGISTER
        window.register = async function () {

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;

            const confirmPassword =
                document.getElementById("confirmPassword").value;


            // CHECK EMPTY
            if (!email || !password || !confirmPassword) {

                alert("Vui lòng nhập đầy đủ thông tin");
                return;

            }


            // CHECK PASSWORD
            if (password.length < 6) {

                alert("Mật khẩu tối thiểu 6 ký tự");
                return;

            }


            // CHECK CONFIRM
            if (password !== confirmPassword) {

                alert("Mật khẩu nhập lại không khớp");
                return;

            }


            try {

                // SAVE ACCOUNT TO FIREBASE
                await createUserWithEmailAndPassword(
                    auth,
                    email,
                    password
                );


                alert("Đăng ký thành công!");

                // CHUYỂN QUA LOGIN
                window.location.href = "login.html";

            }
            catch (error) {

                console.log("ERROR CODE:", error.code);

                console.log("ERROR MESSAGE:", error.message);


                if (error.code === "auth/configuration-not-found") {

                    alert("Bạn chưa bật Email/Password trong Firebase");

                }
                else if (error.code === "auth/email-already-in-use") {

                    alert("Email đã tồn tại");

                }
                else if (error.code === "auth/invalid-email") {

                    alert("Email không hợp lệ");

                }
                else if (error.code === "auth/weak-password") {

                    alert("Mật khẩu tối thiểu 6 ký tự");

                }
                else {

                    alert(error.code);

                }

            }

        }

    </script>

</body>

</html>
