<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Coffee Shop</title>

<style>
body {
    background: #4e342e;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.box {
    background: #fff;
    padding: 30px;
    border-radius: 10px;
    width: 300px;
    text-align: center;
}
input {
    width: 100%;
    padding: 10px;
    margin: 10px 0;
}
button {
    background: #5d4037;
    color: white;
    border: none;
    padding: 10px;
    width: 100%;
    cursor: pointer;
}
a { color: brown; }
</style>

</head>
<body>

<div class="box">
    <h2>☕ Đăng nhập Coffee</h2>

    <input id="login-email" placeholder="Email">
<input id="login-password" type="password" placeholder="Mật khẩu">

    <button onclick="login()">Đăng nhập</button>

    <p>Chưa có tài khoản? <a href="register.html">Đăng ký</a></p>
</div>

<!-- Firebase -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-app-compat.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/12.3.0/firebase-auth-compat.min.js"></script>

<script src="firebase-config.js"></script>

</body>
</html>
