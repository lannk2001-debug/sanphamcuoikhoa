<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - FoodApp</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ffb347, #ffcc33);
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 64px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #ff9900;
        }

        .container {
            width: 380px;
            margin-top: 80px;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: #ff9900;
            color: white;
            font-size: 15px;
            cursor: pointer;
        }

        button:hover {
            background-color: #ca7f0e;
        }

        .switch {
            text-align: center;
            margin-top: 15px;
        }

        .switch a {
            color: #ff9900;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <div class="logo">🍔 FoodApp</div>
    </div>

    <div class="container">

        <div class="card">

            <h2>Đăng nhập</h2>

            <input type="email" id="email" placeholder="Email">

            <input type="password" id="password" placeholder="Mật khẩu">

            <button onclick="login()">
                Đăng nhập
            </button>

            <div class="switch">
                Chưa có tài khoản?
                <a href="register.html">Đăng ký</a>
            </div>

        </div>

    </div>


    <script type="module">

        import { initializeApp }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

        import { getAnalytics }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

        import {
            getAuth,
            signInWithEmailAndPassword
        }
            from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";


        const firebaseConfig = {

            apiKey: "AIzaSyDPZxEPNRzxwDdRZ3L2OcBAaFr7rSBgTgs",

            authDomain: "jsi33-d73a1.firebaseapp.com",

            projectId: "jsi33-d73a1",

            storageBucket: "jsi33-d73a1.firebasestorage.app",

            messagingSenderId: "835817964702",

            appId: "1:835817964702:web:b8852dd46033ea0e04e78f",

            measurementId: "G-FGW0S0XV2V"

        };


        const app = initializeApp(firebaseConfig);

        const analytics = getAnalytics(app);

        const auth = getAuth(app);


        window.login = async function () {

            const email =
                document.getElementById("email").value;

            const password =
                document.getElementById("password").value;


            if (!email || !password) {

                alert("Vui lòng nhập đầy đủ thông tin");
                return;

            }


            try {

                await signInWithEmailAndPassword(
                    auth,
                    email,
                    password
                );


                alert("Đăng nhập thành công!");

                window.location.href = "trang-chu.html";

            }
            catch (error) {

                console.log(error.code);

                alert("Sai email hoặc mật khẩu");

            }

        }

    </script>

</body>

</html>
